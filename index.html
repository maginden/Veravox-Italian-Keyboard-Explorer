
<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyboard Master: Showdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      
      .bg-striped-purple {
        background: repeating-linear-gradient(
          45deg,
          #6366f1,
          #6366f1 10px,
          #818cf8 10px,
          #818cf8 20px
        );
      }
      .key-3d {
        box-shadow: 0 4px 0 0 rgba(0,0,0,0.4);
        transform: translateY(0);
        transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.05s ease;
      }
      .key-3d-pressed {
        box-shadow: 0 1px 0 0 rgba(0,0,0,0.2) !important;
        transform: translateY(3px) !important;
      }
      .key-selected {
        z-index: 10;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), 0 4px 0 0 rgba(0,0,0,0.4);
      }
      
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
  <script type="importmap">

}
</script>

</head>

</body>
</html>
